---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %e, %Y" }}</time>
  </div>

  <aside class="post-author" aria-label="About the author">
    <a href="{{ site.baseurl }}/about/" class="post-author-avatar">
      <picture>
        <source srcset="{{ site.baseurl }}/assets/avatar.webp" type="image/webp">
        <img src="{{ site.baseurl }}/assets/avatar.jpg" alt="Andrew Hoffman" width="80" height="80" loading="lazy" decoding="async">
      </picture>
    </a>
    <div class="post-author-body">
      <p class="post-author-name">Andrew Hoffman</p>
      <p class="post-author-bio">Software & Security Architect | O’Reilly Author | InfoSec Expert. </br>Available for security consulting through Andrew Hoffman, LLC.</p>
      <div class="post-author-actions">
        <a class="llc-btn llc-btn-primary" href="{{ site.baseurl }}/llc/">Hire Andrew &rarr;</a>
        <a class="llc-btn llc-btn-secondary" href="{{ site.baseurl }}/about/">More about Andrew</a>
      </div>
    </div>
  </aside>
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.name }}",
    "url": "{{ site.url }}/about/"
  },
  "publisher": {
    "@type": "Person",
    "name": "{{ site.name }}"
  },
  "url": "{{ site.url }}{{ page.url }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ site.url }}{{ page.url }}"
  },
  "image": "{{ site.url }}{% if page.image %}{{ page.image }}{% else %}{{ site.avatar }}{% endif %}",
  "description": {{ page.excerpt | strip_html | normalize_whitespace | jsonify }}
}
</script>
