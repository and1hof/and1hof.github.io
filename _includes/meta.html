    <meta charset="utf-8" />
    <meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>

    {% assign desc = page.description | default: page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 %}
    {% assign ogtitle = page.title | default: site.name %}

    <meta name="description" content="{{ desc }}" />
    <meta name="author" content="{{ site.name }}" />

    <meta property="og:title" content="{{ ogtitle }}" />
    <meta property="og:description" content="{{ desc }}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@and1hof" />
    <meta name="twitter:creator" content="@and1hof" />
    <meta name="twitter:title" content="{{ ogtitle }}" />
    <meta name="twitter:description" content="{{ desc }}" />
    <meta name="twitter:image" content="{{ site.url }}/assets/avatar.jpg" />
